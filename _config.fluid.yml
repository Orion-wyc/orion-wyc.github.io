#---------------------------
# Hexo Theme Fluid Configuration
# 恢复配置 - 基于 orion-wyc.github.io
#---------------------------

# 全局配置
favicon: /img/favicon.png
apple_touch_icon: /img/favicon.png

# 代码块配置
code:
  copy_btn: true
  language:
    enable: true
    default: "TEXT"
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github gist"
      style_dark: "dark"

# 打字机效果
fun_features:
  typing:
    enable: true
    typeSpeed: 70
    cursorChar: "_"
    loop: false
    scope: []
  anchorjs:
    enable: true
    element: h1,h2,h3,h4,h5,h6
    placement: left
    visible: hover
  progressbar:
    enable: true
    height_px: 3
    color: "#29d"

# 暗色模式
dark_mode:
  enable: true
  default: auto

# 颜色配置（基于原网站）
color:
  body_bg_color: "#eee"
  body_bg_color_dark: "#181c27"
  navbar_bg_color: "#2f4154"
  navbar_bg_color_dark: "#1f3144"
  navbar_text_color: "#fff"
  navbar_text_color_dark: "#d0d0d0"
  subtitle_color: "#fff"
  subtitle_color_dark: "#d0d0d0"
  text_color: "#3c4858"
  text_color_dark: "#c4c6c9"
  sec_text_color: "#718096"
  sec_text_color_dark: "#a7a9ad"
  board_color: "#fff"
  board_color_dark: "#252d38"
  post_text_color: "#2c3e50"
  post_text_color_dark: "#c4c6c9"
  post_heading_color: "#1a202c"
  post_heading_color_dark: "#c4c6c9"
  post_link_color: "#0366d6"
  post_link_color_dark: "#1589e9"

# 字体配置
font:
  font_size: 16px
  font_family:
  letter_spacing: 0.02em
  code_font_size: 85%

# 懒加载
lazyload:
  enable: true
  loading_img: /img/loading.gif
  onlypost: false
  offset_factor: 2

# 图标库
iconfont: //at.alicdn.com/t/font_1736178_kmeydafke9r.css

#---------------------------
# 页头
#---------------------------
navbar:
  blog_title: "Yuchen's Blog"
  ground_glass:
    enable: false
  menu:
    - { key: "首页", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "归档", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "分类", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "关于", link: "/about/", icon: "iconfont icon-user-fill" }

# 搜索功能
search:
  enable: true
  path: /local-search.xml
  generate_path: /local-search.xml
  field: post
  content: true

# Banner 配置
banner:
  random_img: false
  parallax: true
  width_height_ratio: 1.0

scroll_down_arrow:
  enable: true
  banner_height_limit: 80
  scroll_after_turning_page: true

scroll_top_arrow:
  enable: true

#---------------------------
# 页脚
#---------------------------
footer:
  content: "
    <a href=\"\" target=\"_blank\" rel=\"nofollow noopener\"><span>Yuchen</span></a>
    <i class=\"iconfont icon-love\"></i>
    <a href=\"\" target=\"_blank\" rel=\"nofollow noopener\"><span>NoCookEatMcDonald's</span></a>
  "
  statistics:
    enable: false

#---------------------------
# 首页
#---------------------------
index:
  banner_img: /img/main5.jpg
  banner_img_height: 100
  banner_mask_alpha: 0.3
  slogan:
    enable: true
    text: "风物长宜放眼量"
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: true
  post_sticky:
    enable: true
    icon: "iconfont icon-top"

#---------------------------
# 文章页
#---------------------------
post:
  banner_img: /img/default.png
  banner_img_height: 70
  banner_mask_alpha: 0.3
  default_index_img:
  meta:
    author:
      enable: false
    date:
      enable: true
      format: "LL a"
    wordcount:
      enable: true
    min2read:
      enable: true
      awl: 2
      wpm: 60
    views:
      enable: false
      source: "busuanzi"
  updated:
    enable: false
    date_format: "LL a"
    relative: false
  category_bar:
    enable: true
    specific: true
    placement: left
    post_order_by: "title"
    post_limit: 0
  toc:
    enable: true
    expand_all: true
    placement: right
  copyright:
    enable: true
    license: 'BY'
    author:
      enable: true
    post_date:
      enable: true
      format: "LL"
  prev_next:
    enable: true
  image_caption:
    enable: true
  image_zoom:
    enable: true
    img_url_replace: ['', '']
  footnote:
    enable: true
  math:
    enable: true
    specific: false
    engine: katex
  mermaid:
    enable: true
    specific: false
  comments:
    enable: false

#---------------------------
# 归档页
#---------------------------
archive:
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3

#---------------------------
# 分类页
#---------------------------
category:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3
  order_by: "-length"
  collapse_depth: 0
  post_order_by: "-date"
  post_limit: 10

#---------------------------
# 标签页
#---------------------------
tag:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 80
  banner_mask_alpha: 0.3
  tagcloud:
    min_font: 15
    max_font: 30
    unit: px
    start_color: "#BBBBEE"
    end_color: "#337ab7"

#---------------------------
# 关于页
#---------------------------
about:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3
  avatar: /img/favicon.png
  name: "Yuchen"
  intro: "晚饭就吃金拱门 从小爱吃菜~"
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/Orion-wyc", tip: "GitHub" }

#---------------------------
# 自定义页
#---------------------------
page:
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3

#---------------------------
# 404页
#---------------------------
page404:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 85
  banner_mask_alpha: 0.3
  redirect_delay: 5000

#---------------------------
# 友链页
#---------------------------
links:
  enable: false

#---------------------------
# 静态资源
#---------------------------
static_prefix:
  internal_js: /js
  internal_css: /css
  internal_img: /img
  anchor: https://cdn.staticfile.org/anchor-js/5.0.0/
  github_markdown: https://cdn.staticfile.org/github-markdown-css/4.0.0/
  jquery: https://cdn.staticfile.org/jquery/3.4.1/
  bootstrap: https://cdn.staticfile.org/twitter-bootstrap/4.4.1/
  prismjs: https://cdn.staticfile.org/prism/1.29.0/
  tocbot: https://cdn.staticfile.org/tocbot/4.20.1/
  typed: https://cdn.staticfile.org/typed.js/2.0.11/
  fancybox: https://cdn.staticfile.org/fancybox/3.5.7/
  nprogress: https://cdn.staticfile.org/nprogress/0.2.0/
  mathjax: https://cdn.staticfile.org/mathjax/3.2.2/
  katex: https://cdn.jsdelivr.net/npm/katex@0.12.0/
  busuanzi: https://busuanzi.ibruce.info/busuanzi/2.3/
  clipboard: https://cdn.staticfile.org/clipboard.js/2.0.6/
  mermaid: https://cdn.jsdelivr.net/npm/mermaid@10/dist/

#---------------------------
# 自定义样式
# 通过 scripts/injector.js 注入 /css/custom.css
#---------------------------
